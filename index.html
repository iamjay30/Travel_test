<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊足跡</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <!-- 引入 FontAwesome (用於圖示) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f3f4f6;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1; /* 確保地圖在底層 */
        }

        /* 側邊欄樣式 */
        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 350px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 1000; /* 確保側邊欄在地圖上方 */
            padding: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        /* 針對小螢幕的響應式設計 */
        @media (max-width: 768px) {
            .sidebar {
                top: auto;
                bottom: 0;
                right: 0;
                width: 100%;
                border-radius: 20px 20px 0 0;
                max-height: 50vh;
                transform: translateY(100%); /* 預設隱藏 */
            }
            .sidebar.active {
                transform: translateY(0); /* 顯示時滑出 */
            }
            #toggle-sidebar {
                display: block !important;
            }
        }

        /* 自訂彈出視窗樣式 */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
        }
        .leaflet-popup-content {
            margin: 15px;
            text-align: center;
        }

        /* 隱藏/顯示按鈕 (手機版) */
        #toggle-sidebar {
            display: none;
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- 登入遮罩層 -->
    <div id="login-overlay" class="fixed inset-0 bg-gray-50 z-[2000] flex flex-col justify-center items-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center mx-4">
            <i class="fas fa-globe-americas text-6xl text-blue-500 mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">我的旅遊足跡</h1>
            <p class="text-gray-500 mb-8">登入以記錄並在任何裝置上同步您的專屬旅遊地圖</p>
            <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center">
                <i class="fas fa-sign-in-alt mr-2"></i> 登入 / 開始使用
            </button>
            <div id="login-status" class="mt-4 text-sm font-medium text-gray-600"></div>
        </div>
    </div>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <!-- 手機版切換側邊欄按鈕 -->
    <button id="toggle-sidebar">
        <i class="fas fa-list"></i>
    </button>

    <!-- 側邊欄 (新增紀錄表單與列表) -->
    <div class="sidebar" id="sidebar">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-plane-departure text-blue-500 mr-2"></i>我的旅遊足跡</h1>
            <div class="flex items-center">
                <button id="logout-btn" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-1 px-3 rounded mr-2 transition-colors hidden md:block">
                    登出
                </button>
                <button id="close-sidebar" class="text-gray-500 hover:text-gray-700 md:hidden">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        
        <!-- 使用者資訊 -->
        <div class="flex justify-between items-center mb-6 text-sm text-gray-500 border-b pb-2">
            <div><i class="fas fa-user-circle mr-1"></i> <span id="user-id-display">未登入</span></div>
            <button id="logout-btn-mobile" class="md:hidden text-red-500 hover:text-red-700">登出</button>
        </div>

        <!-- 新增紀錄表單 -->
        <div class="bg-blue-50 p-4 rounded-lg mb-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-3"><i class="fas fa-plus-circle mr-2"></i>新增足跡</h2>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">城市名稱</label>
                    <input type="text" id="city-input" placeholder="例如：東京, 巴黎" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <p class="text-xs text-gray-500 mt-1">輸入名稱點擊「新增標記」，或直接點擊地圖</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">旅遊日期</label>
                    <input type="date" id="date-input" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Google 相簿連結</label>
                    <input type="url" id="album-input" placeholder="https://photos.app.goo.gl/..." class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <!-- 新增標記按鈕 -->
                <button id="add-record-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition-colors mt-2">
                    <i class="fas fa-plus mr-1"></i> 新增標記
                </button>
                <!-- 提示訊息區 -->
                <div id="status-message" class="text-sm font-medium hidden"></div>
            </div>
        </div>

        <!-- 已紀錄列表 -->
        <div>
            <h2 class="text-lg font-semibold text-gray-700 mb-3"><i class="fas fa-map-marker-alt mr-2"></i>已紀錄城市 (<span id="record-count">0</span>)</h2>
            <div id="record-list" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                <!-- 紀錄項目將由 JS 動態產生 -->
                <p class="text-gray-500 text-sm italic text-center py-4" id="empty-state">尚無旅遊紀錄，開始標記吧！</p>
            </div>
        </div>
    </div>

    <!-- 引入 Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 初始化設定
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'travel-map-default';
        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
        let app, db, auth;
        let currentUser = null;
        let unsubscribeSnapshot = null;

        try {
            const firebaseConfig = JSON.parse(firebaseConfigStr);
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
        } catch (e) {
            console.error("Firebase 初始化失敗，可能是環境變數未提供", e);
        }

        // 初始化狀態與變數
        let map;
        let markers = []; // 儲存所有標記的陣列
        let records = []; // 儲存旅遊紀錄資料的陣列
        let isWaitingForLocation = false; // 是否正在等待使用者點擊地圖標記

        // DOM 元素
        const cityInput = document.getElementById('city-input');
        const dateInput = document.getElementById('date-input');
        const albumInput = document.getElementById('album-input');
        const statusMessage = document.getElementById('status-message');
        const recordList = document.getElementById('record-list');
        const recordCount = document.getElementById('record-count');
        const emptyState = document.getElementById('empty-state');
        const sidebar = document.getElementById('sidebar');
        const toggleSidebarBtn = document.getElementById('toggle-sidebar');
        const closeSidebarBtn = document.getElementById('close-sidebar');
        const addRecordBtn = document.getElementById('add-record-btn');
        
        // 驗證相關 DOM
        const loginOverlay = document.getElementById('login-overlay');
        const loginBtn = document.getElementById('login-btn');
        const loginStatus = document.getElementById('login-status');
        const logoutBtn = document.getElementById('logout-btn');
        const logoutBtnMobile = document.getElementById('logout-btn-mobile');
        const userIdDisplay = document.getElementById('user-id-display');

        loginBtn.addEventListener('click', async () => {
            if (!auth) {
                loginStatus.textContent = "無法連線至驗證伺服器";
                return;
            }
            loginStatus.textContent = "登入中...";
            loginBtn.disabled = true;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Login error", error);
                loginStatus.textContent = "登入失敗：" + error.message;
                loginBtn.disabled = false;
            }
        });

        const handleLogout = async () => {
            if (auth) await signOut(auth);
        };
        logoutBtn.addEventListener('click', handleLogout);
        logoutBtnMobile.addEventListener('click', handleLogout);

        if (auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    loginOverlay.style.display = 'none';
                    userIdDisplay.textContent = `${user.uid}`;
                    loginBtn.disabled = false;
                    loginStatus.textContent = "";
                    
                    if (!map) initMap();
                    loadRecordsFromFirestore();
                } else {
                    currentUser = null;
                    loginOverlay.style.display = 'flex';
                    userIdDisplay.textContent = '未登入';
                    
                    // 清除本地資料與地圖標記
                    records = [];
                    markers.forEach(m => {
                        if (map) map.removeLayer(m);
                    });
                    markers = [];
                    updateRecordList();
                    
                    if (unsubscribeSnapshot) {
                        unsubscribeSnapshot();
                        unsubscribeSnapshot = null;
                    }
                }
            });
        } else {
            // Fallback for local testing without Firebase env
            loginOverlay.style.display = 'none';
            initMap();
        }

        function initMap() {
            // 設定初始中心點 (台灣) 和縮放級別
            map = L.map('map').setView([23.6978, 120.9605], 4);

            // 加入 Google Maps 圖層以確保顯示繁體中文
            L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&hl=zh-TW', {
                maxZoom: 19,
                attribution: '© Google'
            }).addTo(map);

            // 監聽地圖點擊事件
            map.on('click', handleMapClick);

            // 監聽新增按鈕點擊事件
            addRecordBtn.addEventListener('click', handleAddButtonClick);
        }

        async function handleAddButtonClick() {
            const cityName = cityInput.value.trim();
            const date = dateInput.value;
            const albumLink = albumInput.value.trim();

            if (!cityName) {
                showStatus('請輸入城市名稱', 'error');
                cityInput.focus();
                return;
            }

            // 顯示載入中狀態
            addRecordBtn.disabled = true;
            addRecordBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> 搜尋中...';

            try {
                // 呼叫 Nominatim API 將城市名稱轉為經緯度 (Geocoding)
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cityName)}&accept-language=zh-TW&limit=1`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    
                    // 為了畫面美觀，取最前面的地名
                    let displayName = data[0].display_name.split(',')[0];
                    if (cityName.length < displayName.length) {
                        displayName = cityName; // 如果使用者輸入的名字比較短，優先使用使用者的輸入
                    }

                    const newRecord = {
                        id: Date.now().toString(),
                        city: displayName,
                        date: date || '未提供日期',
                        album: albumLink,
                        lat: lat,
                        lng: lon
                    };

                    if (currentUser && db) {
                        const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'travelRecords', newRecord.id);
                        await setDoc(docRef, newRecord);
                    } else {
                        // Fallback
                        addMarkerToMap(newRecord);
                        records.push(newRecord);
                        updateRecordList();
                    }

                    // 飛梭動畫移動至該點
                    map.flyTo([lat, lon], 10);

                    cityInput.value = '';
                    dateInput.value = '';
                    albumInput.value = '';
                    showStatus('成功新增標記！', 'success');
                } else {
                    showStatus('找不到該城市，請嘗試更詳細的地名或直接點擊地圖', 'error');
                }
            } catch (error) {
                showStatus('搜尋時發生錯誤，請稍後再試', 'error');
            } finally {
                // 恢復按鈕狀態
                addRecordBtn.disabled = false;
                addRecordBtn.innerHTML = '<i class="fas fa-plus mr-1"></i> 新增標記';
            }
        }

        async function handleMapClick(e) {
            const date = dateInput.value;
            const albumLink = albumInput.value.trim();
            let cityName = cityInput.value.trim();

            showStatus('正在取得位置資訊...', 'success');

            try {
                // 若使用者沒輸入城市，透過 API 反查點擊位置的地名 (Reverse Geocoding)
                if (!cityName) {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&accept-language=zh-TW`);
                    const data = await response.json();
                    
                    if (data && data.address) {
                        cityName = data.address.city || data.address.town || data.address.village || data.address.county || data.address.state || data.name || '未知地點';
                    } else {
                        cityName = '自訂地點';
                    }
                }

                // 建立新紀錄物件
                const newRecord = {
                    id: Date.now().toString(),
                    city: cityName,
                    date: date || '未提供日期',
                    album: albumLink,
                    lat: e.latlng.lat,
                    lng: e.latlng.lng
                };

                if (currentUser && db) {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'travelRecords', newRecord.id);
                    await setDoc(docRef, newRecord);
                } else {
                    addMarkerToMap(newRecord);
                    records.push(newRecord);
                    updateRecordList();
                }

                // 清空輸入框
                cityInput.value = '';
                dateInput.value = '';
                albumInput.value = '';
                
                showStatus('成功新增標記！', 'success');
            } catch (error) {
                showStatus('取得位置資訊失敗', 'error');
            }
        }

        function addMarkerToMap(record) {
            // 自訂圖標 (可選，這裡使用預設但改顏色)
            const customIcon = L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });

            const marker = L.marker([record.lat, record.lng], { icon: customIcon }).addTo(map);
            
            // 建立 Popup 內容
            let popupContent = `
                <div class="font-sans">
                    <h3 class="text-lg font-bold text-gray-800 mb-1">${record.city}</h3>
                    <p class="text-sm text-gray-600 mb-2"><i class="far fa-calendar-alt mr-1"></i> ${record.date}</p>
            `;
            
            if (record.album) {
                popupContent += `
                    <a href="${record.album}" target="_blank" class="inline-block bg-blue-500 hover:bg-blue-600 text-white text-xs font-semibold py-1 px-3 rounded-full no-underline transition-colors mt-1">
                        <i class="fab fa-google mr-1"></i> 查看相簿
                    </a>
                `;
            }
            
            popupContent += `
                <br>
                <button onclick="deleteRecord('${record.id}')" class="mt-3 text-red-500 hover:text-red-700 text-xs font-semibold">
                    <i class="fas fa-trash-alt mr-1"></i> 刪除此標記
                </button>
                </div>
            `;

            marker.bindPopup(popupContent);
            
            // 將標記和 ID 關聯起來以便後續刪除
            marker.recordId = record.id;
            markers.push(marker);
        }

        function updateRecordList() {
            recordList.innerHTML = '';
            recordCount.textContent = records.length;

            if (records.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            // 依日期排序 (新的在前面)
            const sortedRecords = [...records].sort((a, b) => {
                if(a.date === '未提供日期') return 1;
                if(b.date === '未提供日期') return -1;
                return new Date(b.date) - new Date(a.date);
            });

            sortedRecords.forEach(record => {
                const item = document.createElement('div');
                item.className = 'bg-white border border-gray-200 rounded-lg p-3 hover:shadow-md transition-shadow cursor-pointer flex justify-between items-center group';
                
                // 點擊列表項目移動地圖中心
                item.onclick = () => {
                    map.flyTo([record.lat, record.lng], 8);
                    // 找到對應的 marker 並開啟 popup
                    const marker = markers.find(m => m.recordId === record.id);
                    if(marker) marker.openPopup();
                    
                    // 若在手機版，點擊後隱藏側邊欄
                    if(window.innerWidth <= 768) {
                        sidebar.classList.remove('active');
                    }
                };

                let albumHtml = record.album 
                    ? `<a href="${record.album}" target="_blank" onclick="event.stopPropagation()" class="text-blue-500 hover:text-blue-700 ml-2" title="查看相簿"><i class="fas fa-image"></i></a>` 
                    : '';

                item.innerHTML = `
                    <div>
                        <h4 class="font-bold text-gray-800">${record.city}</h4>
                        <p class="text-xs text-gray-500">${record.date}</p>
                    </div>
                    <div class="flex items-center">
                        ${albumHtml}
                        <button onclick="event.stopPropagation(); deleteRecord('${record.id}')" class="text-gray-400 hover:text-red-500 ml-3 opacity-0 group-hover:opacity-100 transition-opacity" title="刪除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                recordList.appendChild(item);
            });
        }

        // 刪除紀錄
        window.deleteRecord = async function(id) {
            if (currentUser && db) {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'travelRecords', id);
                try {
                    await deleteDoc(docRef);
                    showStatus('已刪除紀錄', 'success');
                } catch (e) {
                    showStatus('刪除失敗', 'error');
                }
            } else {
                // Fallback local delete
                const markerIndex = markers.findIndex(m => m.recordId === id);
                if (markerIndex !== -1) {
                    map.removeLayer(markers[markerIndex]);
                    markers.splice(markerIndex, 1);
                }
                records = records.filter(r => r.id !== id);
                updateRecordList();
                showStatus('已刪除紀錄', 'success');
            }
        };

        // 顯示狀態訊息
        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.style.display = 'block';
            
            if (type === 'error') {
                statusMessage.className = 'text-sm font-medium text-red-600 mt-2 p-2 bg-red-50 rounded';
            } else {
                statusMessage.className = 'text-sm font-medium text-green-600 mt-2 p-2 bg-green-50 rounded';
            }

            // 3秒後隱藏
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 3000);
        }

        function loadRecordsFromFirestore() {
            if (!currentUser || !db) return;
            
            const collRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'travelRecords');
            
            showStatus('同步資料中...', 'success');
            
            unsubscribeSnapshot = onSnapshot(collRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const record = change.doc.data();
                        records.push(record);
                        addMarkerToMap(record);
                    }
                    if (change.type === "removed") {
                        const id = change.doc.id;
                        records = records.filter(r => r.id !== id);
                        const markerIndex = markers.findIndex(m => m.recordId === id);
                        if (markerIndex !== -1) {
                            map.removeLayer(markers[markerIndex]);
                            markers.splice(markerIndex, 1);
                        }
                    }
                });
                updateRecordList();
            }, (error) => {
                console.error("資料載入失敗", error);
                showStatus('資料同步失敗', 'error');
            });
        }

        // 手機版側邊欄切換
        toggleSidebarBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        closeSidebarBtn.addEventListener('click', () => {
            sidebar.classList.remove('active');
        });

    </script>
</body>
</html>
